name: LowerBackStretching
options:
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: false
  bundleIdPrefix: com.derekgallardo
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: 9U3ZSABZG7
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_BITCODE: NO

targets:
  LowerBackStretching:
    type: application
    platform: iOS
    sources:
      - path: LowerBackStretching/App
      - path: LowerBackStretching/Audio
      - path: LowerBackStretching/Calendar
      - path: LowerBackStretching/Data
      - path: LowerBackStretching/Health
      - path: LowerBackStretching/Models
      - path: LowerBackStretching/Notifications
      - path: LowerBackStretching/Share
      - path: LowerBackStretching/Sync
      - path: LowerBackStretching/Views
      - path: LowerBackStretching/Assets.xcassets
        buildPhase: resources
      - path: LowerBackStretching/Resources/stretches.json
        buildPhase: resources
      - path: LowerBackStretching/Resources/programs.json
        buildPhase: resources
      - path: LowerBackStretching/Resources/glossary.json
        buildPhase: resources
    entitlements:
      path: LowerBackStretching/LowerBackStretching.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.derekgallardo.lowerbackstretching
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LowerBackStretching/LowerBackStretching.entitlements

  LowerBackStretchingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LowerBackStretchingTests
    dependencies:
      - target: LowerBackStretching
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.derekgallardo.lowerbackstretching.tests
        GENERATE_INFOPLIST_FILE: YES

  LowerBackStretchingUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LowerBackStretchingUITests
    dependencies:
      - target: LowerBackStretching
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.derekgallardo.lowerbackstretching.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: LowerBackStretching
