name: Android instrumented tests

# Heavy — runs the emulator. Triggered manually or on a schedule so it
# doesn't gate every PR.
on:
  workflow_dispatch:
  schedule:
    # 04:00 UTC nightly.
    - cron: '0 4 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  emulator-tests:
    name: Pixel 6 + Pixel Tablet
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: android
    strategy:
      fail-fast: false
      matrix:
        device: [pixel6Api34, pixelTabletApi34]
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Run instrumented tests via Gradle Managed Devices
        run: gradle :app:${{ matrix.device }}DebugAndroidTest --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-${{ matrix.device }}
          path: android/app/build/reports/androidTests/
          retention-days: 14
