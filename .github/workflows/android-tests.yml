name: Android tests

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'

# Cancel any in-flight run for the same branch when a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # Each gradle invocation: if it fails, print the Kotlin error
      # lines from its captured stdout BEFORE re-exiting. The errors
      # then appear at the BOTTOM of the failing step (where the user
      # actually looks), as ::error:: annotations, AND in the run
      # summary. Three places — no way to miss them.
      - name: Compile :core (main + test)
        run: |
          gradle :core:compileKotlin :core:compileTestKotlin \
            --stacktrace --console=plain 2>&1 | tee /tmp/core.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then bash $GITHUB_WORKSPACE/.github/scripts/print-kotlin-errors.sh /tmp/core.log; fi
          exit $rc

      - name: Compile :app (debug + test)
        run: |
          gradle :app:compileDebugKotlin :app:compileDebugUnitTestKotlin \
            --stacktrace --console=plain 2>&1 | tee /tmp/app.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then bash $GITHUB_WORKSPACE/.github/scripts/print-kotlin-errors.sh /tmp/app.log; fi
          exit $rc

      - name: Compile :wear (debug + test)
        run: |
          gradle :wear:compileDebugKotlin :wear:compileDebugUnitTestKotlin \
            --stacktrace --console=plain 2>&1 | tee /tmp/wear.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then bash $GITHUB_WORKSPACE/.github/scripts/print-kotlin-errors.sh /tmp/wear.log; fi
          exit $rc

      - name: Run :core unit tests
        run: |
          gradle :core:test --stacktrace --console=plain 2>&1 | tee /tmp/core-test.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then bash $GITHUB_WORKSPACE/.github/scripts/print-kotlin-errors.sh /tmp/core-test.log; fi
          exit $rc

      - name: Run :app unit tests
        run: |
          gradle :app:testDebugUnitTest --stacktrace --console=plain 2>&1 | tee /tmp/app-test.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then bash $GITHUB_WORKSPACE/.github/scripts/print-kotlin-errors.sh /tmp/app-test.log; fi
          exit $rc

      - name: Run :wear unit tests
        run: |
          gradle :wear:testDebugUnitTest --stacktrace --console=plain 2>&1 | tee /tmp/wear-test.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then bash $GITHUB_WORKSPACE/.github/scripts/print-kotlin-errors.sh /tmp/wear-test.log; fi
          exit $rc

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            android/core/build/reports/tests/
            android/app/build/reports/tests/
            android/wear/build/reports/tests/
            /tmp/*.log
          retention-days: 14

  # Instrumented tests need an emulator, which doubles CI time and is
  # flaky on the free runners. Kept as a separate workflow file
  # (android-instrumented-tests.yml) so it can be triggered manually
  # or scheduled nightly without blocking PRs.
