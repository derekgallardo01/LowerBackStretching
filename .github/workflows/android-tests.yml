name: Android tests

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'

# Cancel any in-flight run for the same branch when a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # Each gradle invocation tees stdout+stderr to a per-step log
      # file. On step failure the next step prints the file's tail to
      # the run summary so the actual Kotlin error is visible in the
      # GitHub Actions UI without having to download artifacts.
      - name: Compile :core (main + test)
        id: compile_core
        run: |
          set -o pipefail
          gradle :core:compileKotlin :core:compileTestKotlin \
            --stacktrace --console=plain 2>&1 | tee /tmp/core.log

      - name: Compile :app (debug + test)
        id: compile_app
        run: |
          set -o pipefail
          gradle :app:compileDebugKotlin :app:compileDebugUnitTestKotlin \
            --stacktrace --console=plain 2>&1 | tee /tmp/app.log

      - name: Compile :wear (debug + test)
        id: compile_wear
        run: |
          set -o pipefail
          gradle :wear:compileDebugKotlin :wear:compileDebugUnitTestKotlin \
            --stacktrace --console=plain 2>&1 | tee /tmp/wear.log

      - name: Run :core unit tests
        run: gradle :core:test --stacktrace --console=plain 2>&1 | tee /tmp/core-test.log

      - name: Run :app unit tests
        run: gradle :app:testDebugUnitTest --stacktrace --console=plain 2>&1 | tee /tmp/app-test.log

      - name: Run :wear unit tests
        run: gradle :wear:testDebugUnitTest --stacktrace --console=plain 2>&1 | tee /tmp/wear-test.log

      - name: Echo errors to job summary
        if: failure()
        run: |
          {
            echo "## Kotlin compile / test errors"
            for f in /tmp/core.log /tmp/app.log /tmp/wear.log \
                    /tmp/core-test.log /tmp/app-test.log /tmp/wear-test.log; do
              [ -f "$f" ] || continue
              # Lines the Kotlin compiler / Gradle uses for compile errors.
              hits=$(grep -E "^e: |error:|FAILED|> Task.*FAILED" "$f" || true)
              if [ -n "$hits" ]; then
                echo ""
                echo "### $f"
                echo '```'
                echo "$hits" | head -80
                echo '```'
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            android/core/build/reports/tests/
            android/app/build/reports/tests/
            android/wear/build/reports/tests/
            /tmp/*.log
          retention-days: 14

  # Instrumented tests need an emulator, which doubles CI time and is
  # flaky on the free runners. Kept as a separate workflow file
  # (android-instrumented-tests.yml) so it can be triggered manually
  # or scheduled nightly without blocking PRs.
