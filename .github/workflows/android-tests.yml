name: Android tests

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'
      - '.github/scripts/**'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'
      - '.github/scripts/**'

# Cancel any in-flight run for the same branch when a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pre-empt the Sept 2026 Node 20 → Node 24 forced upgrade. The actions
# we depend on still ship Node 20 binaries; this env var asks the
# runner to invoke them under Node 24 today. Drop once each action
# publishes a Node 24 release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # The test task implicitly compiles main + test, so any Kotlin
      # compile error surfaces here. The wrapper script tees stdout to
      # /tmp/*.log and runs print-kotlin-errors.sh on failure so the
      # e:/error: lines appear inline, as ::error:: annotations, and
      # in the run summary.
      - name: Run :core unit tests
        run: bash "$GITHUB_WORKSPACE/.github/scripts/gradle-with-diag.sh" /tmp/core.log :core:test

      - name: Run :app unit tests
        run: bash "$GITHUB_WORKSPACE/.github/scripts/gradle-with-diag.sh" /tmp/app.log :app:testDebugUnitTest

      - name: Run :wear unit tests
        run: bash "$GITHUB_WORKSPACE/.github/scripts/gradle-with-diag.sh" /tmp/wear.log :wear:testDebugUnitTest

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            android/core/build/reports/tests/
            android/app/build/reports/tests/
            android/wear/build/reports/tests/
            /tmp/*.log
          retention-days: 14

  # Instrumented tests need an emulator, which doubles CI time and is
  # flaky on the free runners. Kept as a separate workflow file
  # (android-instrumented-tests.yml) so it can be triggered manually
  # or scheduled nightly without blocking PRs.
