name: Android tests

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-tests.yml'

# Cancel any in-flight run for the same branch when a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: JVM unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Run :core unit tests
        run: gradle :core:test --stacktrace

      - name: Run :app unit tests
        run: gradle :app:testDebugUnitTest --stacktrace

      - name: Run :wear unit tests
        run: gradle :wear:testDebugUnitTest --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            android/core/build/reports/tests/
            android/app/build/reports/tests/
            android/wear/build/reports/tests/
          retention-days: 14

  # Instrumented tests need an emulator, which doubles CI time and is
  # flaky on the free runners. Kept as a separate workflow file
  # (android-instrumented-tests.yml) so it can be triggered manually
  # or scheduled nightly without blocking PRs.
